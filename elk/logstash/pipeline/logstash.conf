input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if ![service] {
    mutate {
      add_field => {
        "service" => "Telco-Incident-Management"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "telco-incident-management-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
